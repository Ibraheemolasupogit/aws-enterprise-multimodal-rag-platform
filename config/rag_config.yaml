# Local-first RAG configuration.
input_document_dir: documents/sample
processed_output_dir: data/processed
chunk_size_words: 120
chunk_overlap_words: 20
embedding_dimension: 32
embedding_output_path: data/processed/chunk_embeddings.json
retrieval_top_k: 3
retrieval_results_output_path: outputs/sample/retrieval_results.json
sample_query: How should AI-generated responses handle source material?
minimum_query_words: 3
minimum_similarity_score: -1.0
retrieval_context_output_path: outputs/sample/retrieval_context.json
retrieval_context_report_path: reports/sample/retrieval_context_report.md
rag_prompt_output_path: outputs/sample/rag_prompt.json
generated_answer_output_path: outputs/sample/generated_answer.json
rag_generation_report_path: reports/sample/rag_generation_report.md
system_instruction: You are a local mock RAG assistant that answers only from retrieved enterprise context.
max_context_blocks: 3
answer_style: concise_grounded_summary
evaluation_questions_path: data/evaluation/sample_questions.csv
evaluation_results_json_path: outputs/sample/evaluation_results.json
evaluation_results_csv_path: outputs/sample/evaluation_results.csv
evaluation_report_path: reports/sample/rag_evaluation_report.md
evaluation_minimum_overall_score: 0.6
evaluation_keyword_weight: 0.35
evaluation_groundedness_weight: 0.3
evaluation_citation_weight: 0.2
evaluation_completeness_weight: 0.15
guardrail_results_output_path: outputs/sample/guardrail_results.json
guardrail_report_path: reports/sample/guardrail_report.md

retrieval:
  strategy: local_vector_placeholder
  top_k: 3
  enable_citations: true
  minimum_similarity_score: -1.0

chunking:
  strategy: local_word_chunking
  chunk_size_words: 120
  chunk_overlap_words: 20

generation:
  mode: mock_local_generation
  answer_style: concise_grounded_summary
  max_context_blocks: 3

evaluation:
  scoring_mode: deterministic_local_rules
  minimum_overall_score: 0.6
